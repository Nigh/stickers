name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Pack sticker directories
        run: |
          mkdir -p dist

          found=0
          for dir in images/*/; do
            [ -d "$dir" ] || continue
            found=1
            name=$(basename "$dir")
            echo "Packing ${name}.zip"
            (cd "$dir" && zip -r "../../dist/${name}.zip" .)
          done

          if [ "$found" -eq 0 ]; then
            echo "No subdirectories found under images/"
            exit 1
          fi

          ls -lh dist/

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/*.zip
          generate_release_notes: true
